<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

  <!-- Header -->
  <h1 class="text-2xl font-bold text-gray-800 mb-1">
    Complete Payment
  </h1>
  <p class="text-gray-500 mb-6">
    Select a cryptocurrency to continue
  </p>

  <!-- Price -->
  <div class="bg-gray-50 p-4 rounded-xl mb-6">
    <div class="flex justify-between items-center">
      <span class="text-gray-600">Regular + Single accomodation</span>
      <span class="text-xl font-semibold">$9</span>
    </div>
  </div>

  <!-- Payment Options -->
  <div class="space-y-4">

    <!-- SOL -->
    <button onclick="openSolanaPayment()" class="w-full flex items-center justify-between border rounded-xl p-4 hover:bg-gray-50 transition group">

      <div class="flex items-center space-x-3">
        <img src="https://cryptologos.cc/logos/solana-sol-logo.png?v=029"
             class="w-8 h-8" alt="Solana">
        <div>
          <div class="font-semibold text-gray-800">Solana</div>
          <div class="text-sm text-gray-500">Pay with SOL</div>
        </div>
      </div>

      <div class="text-purple-600 font-semibold group-hover:translate-x-1 transition">
        →
      </div>
    </button>

    <!-- USDT -->
    <button onclick="pay('usdttrc20')" 
      class="w-full flex items-center justify-between border rounded-xl p-4 hover:bg-gray-50 transition group">

      <div class="flex items-center space-x-3">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=029"
             class="w-8 h-8" alt="USDT">
        <div>
          <div class="font-semibold text-gray-800">Tether (USDT)</div>
          <div class="text-sm text-gray-500">TRC20 Network</div>
        </div>
      </div>

      <div class="text-green-600 font-semibold group-hover:translate-x-1 transition">
        →
      </div>
    </button>

    <!-- BNB -->
    <button onclick="pay('bnb')" 
      class="w-full flex items-center justify-between border rounded-xl p-4 hover:bg-gray-50 transition group">

      <div class="flex items-center space-x-3">
        <img src="https://cryptologos.cc/logos/bnb-bnb-logo.png?v=029"
             class="w-8 h-8" alt="BNB">
        <div>
          <div class="font-semibold text-gray-800">BNB</div>
          <div class="text-sm text-gray-500">Binance Smart Chain</div>
        </div>
      </div>

      <div class="text-yellow-500 font-semibold group-hover:translate-x-1 transition">
        →
      </div>
    </button>

  </div>

  <!-- Loading -->
  <div id="loading" class="hidden mt-6 text-center">
    <div class="flex justify-center items-center space-x-2">
      <div class="w-3 h-3 bg-gray-400 rounded-full animate-bounce"></div>
      <div class="w-3 h-3 bg-gray-400 rounded-full animate-bounce [animation-delay:.2s]"></div>
      <div class="w-3 h-3 bg-gray-400 rounded-full animate-bounce [animation-delay:.4s]"></div>
    </div>
    <p class="text-gray-500 mt-2">Redirecting to secure payment...</p>
  </div>

</div>

<script>
async function pay(currency) {

  document.getElementById("loading").classList.remove("hidden");

  try {
    const response = await fetch("/create-invoice", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        currency: currency,
        amount: 0.5
      })
    });

    const data = await response.json();

    if (data.invoice_url) {
      window.location.href = data.invoice_url;
    } else {
      alert("Payment initialization failed.");
    }

  } catch (err) {
    alert("Server error.");
  }

  document.getElementById("loading").classList.add("hidden");
}

function openSolanaPayment() {
  const modal = document.getElementById('paymentModal');
  const container = document.getElementById('iframeContainer');
  
  // Inject the iframe HTML
  container.innerHTML = `<iframe src="https://nowpayments.io/embeds/payment-widget?iid=4963300000" width="410" height="696" frameborder="0" scrolling="no" style="overflow-y: hidden; max-width: 100%;">Can't load widget</iframe>`;
  
  // Show the modal
  modal.classList.remove('hidden');
}

function closeModal() {
  const modal = document.getElementById('paymentModal');
  const container = document.getElementById('iframeContainer');
  
  modal.classList.add('hidden');
  container.innerHTML = ''; // Clear iframe to stop processes
}
</script>
<div id="paymentModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl p-2 relative shadow-2xl max-w-lg w-full flex flex-col items-center">
    
    <button onclick="closeModal()" class="absolute -top-10 right-0 text-white hover:text-gray-300 text-sm font-bold">
      ✕ CLOSE
    </button>

    <div id="iframeContainer" class="w-full flex justify-center overflow-hidden rounded-xl">
      </div>
  </div>
</div>
</body>
</html>
