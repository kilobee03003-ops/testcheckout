<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complete Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-3xl p-10 rounded-2xl shadow-lg">

    <h1 class="text-3xl font-bold text-gray-800 mb-2">
      Complete Payment
    </h1>
    <p class="text-gray-500 mb-8">
      Choose cryptocurrency & network
    </p>

    <!-- ================= USDT ================= -->
    <h2 class="text-lg font-semibold text-gray-700 mb-4">USDT</h2>
    <div class="grid grid-cols-2 gap-4 mb-8">

      <button onclick="buyCrypto('usdtsol')" class="crypto-btn">
        USDT - Solana
      </button>

      <button onclick="buyCrypto('usdtbsc')" class="crypto-btn">
        USDT - BNB Smart Chain
      </button>

      <button onclick="buyCrypto('usdteth')" class="crypto-btn">
        USDT - Ethereum
      </button>

    </div>

    <!-- ================= USDC ================= -->
    <h2 class="text-lg font-semibold text-gray-700 mb-4">USDC</h2>
    <div class="grid grid-cols-2 gap-4 mb-8">

      <button onclick="buyCrypto('usdcspl')" class="crypto-btn">
        USDC - Solana
      </button>

      <button onclick="buyCrypto('usdcbsc')" class="crypto-btn">
        USDC - BNB Smart Chain
      </button>

      <button onclick="buyCrypto('usdceth')" class="crypto-btn">
        USDC - Ethereum
      </button>

      <button onclick="buyCrypto('usdcbase')" class="crypto-btn">
        USDC - Base
      </button>

    </div>

    <!-- ================= Native Coins ================= -->
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Native Coins</h2>
    <div class="grid grid-cols-2 gap-4">

      <button onclick="buyCrypto('sol')" class="crypto-btn">
        SOL - Solana
      </button>

      <button onclick="buyCrypto('bnb')" class="crypto-btn">
        BNB - BNB Mainnet
      </button>

      <button onclick="buyCrypto('eth')" class="crypto-btn">
        ETH - Ethereum
      </button>

      <button onclick="buyCrypto('base')" class="crypto-btn">
        BASE - Base Mainnet
      </button>

    </div>

  </div>

  <!-- ================= STYLES ================= -->
  <style>
    .crypto-btn {
      background-color: #f3f4f6;
      padding: 14px;
      border-radius: 12px;
      text-align: left;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .crypto-btn:hover {
      background-color: #e5e7eb;
      transform: translateY(-2px);
    }
  </style>

  <!-- ================= SCRIPT ================= -->
  <script>
    async function buyCrypto(cryptoCode) {

      // 🔥 You can change ticketType dynamically if needed
      const ticketType = "vip";

      try {
        const res = await fetch("/api/create-payment", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ticketType: ticketType,
            crypto: cryptoCode
          })
        });

        const data = await res.json();

        if (data.invoice_url) {
          window.location.href = data.invoice_url;
        } else {
          alert(data.error || "Payment failed");
        }

      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }
  </script>

</body>
</html>
