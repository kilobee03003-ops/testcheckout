<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crypto Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white w-full max-w-xl p-8 rounded-3xl shadow-2xl">

  <h1 class="text-3xl font-bold text-gray-800 mb-2">
    Complete Payment
  </h1>
  <p class="text-gray-500 mb-8">
    Choose cryptocurrency & network
  </p>

  <!-- ================= USDT ================= -->
  <div class="mb-10">
    <h2 class="font-semibold text-gray-700 mb-4">USDT</h2>
    <div class="space-y-3">

      <button onclick="pay('usdt_sol')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-8 h-8">
          <span>USDT - Solana</span>
        </div>
      </button>

      <button onclick="pay('usdt_bnb')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-8 h-8">
          <span>USDT - BNB Smart Chain</span>
        </div>
      </button>

      <button onclick="pay('usdt_eth')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-8 h-8">
          <span>USDT - Ethereum</span>
        </div>
      </button>

     

    </div>
  </div>

  <!-- ================= USDC ================= -->
  <div class="mb-10">
    <h2 class="font-semibold text-gray-700 mb-4">USDC</h2>
    <div class="space-y-3">

      <button onclick="pay('usdc_sol')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="w-8 h-8">
          <span>USDC - Solana</span>
        </div>
      </button>

      <button onclick="pay('usdc_bnb')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="w-8 h-8">
          <span>USDC - BNB Smart Chain</span>
        </div>
      </button>

      <button onclick="pay('usdc_eth')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="w-8 h-8">
          <span>USDC - Ethereum</span>
        </div>
      </button>

      <button onclick="pay('usdc_base')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="w-8 h-8">
          <span>USDC - Base</span>
        </div>
      </button>

    </div>
  </div>

  <!-- ================= NATIVE COINS ================= -->
  <div>
    <h2 class="font-semibold text-gray-700 mb-4">Native Coins</h2>
    <div class="space-y-3">

      <button onclick="pay('sol_native')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/solana-sol-logo.png" class="w-8 h-8">
          <span>SOL - Solana</span>
        </div>
      </button>

      <button onclick="pay('bnb_native')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/bnb-bnb-logo.png" class="w-8 h-8">
          <span>BNB - BNB Mainnet</span>
        </div>
      </button>

      <button onclick="pay('eth_native')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="w-8 h-8">
          <span>ETH - Ethereum</span>
        </div>
      </button>

      <button onclick="pay('base_native')" class="btn">
        <div class="flex items-center space-x-3">
          <img src="https://cryptologos.cc/logos/base-base-logo.png" class="w-8 h-8">
          <span>BASE - Base Mainnet</span>
        </div>
      </button>

    </div>
  </div>

</div>

<!-- MODAL -->
<div id="paymentModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
  <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl relative p-4 flex flex-col items-center">
    <button onclick="closeModal()" class="absolute -top-10 right-0 text-white font-bold">
      ✕ CLOSE
    </button>
    <div id="iframeContainer" class="w-full flex justify-center rounded-xl overflow-hidden"></div>
  </div>
</div>

<script>

const invoices = {

  usdt_sol: "5630734139",
  usdt_bnb: "5131160002",
  usdt_eth: "5047538383",
 

  usdc_sol: "5320361699",
  usdc_bnb: "5432885759",
  usdc_eth: "5094465611",
  usdc_base: "6031085118",

  sol_native: "4548522175",
  bnb_native: "5559656259",
  eth_native: "5284590599",
  base_native: "6033769517"

};

function pay(type) {

  const modal = document.getElementById("paymentModal");
  const container = document.getElementById("iframeContainer");
  const invoiceId = invoices[type];

  container.innerHTML = `
    <iframe
      src="https://nowpayments.io/embeds/payment-widget?iid=${invoiceId}"
      width="410"
      height="696"
      frameborder="0"
      scrolling="no"
      style="overflow-y:hidden; max-width:100%;">
    </iframe>
  `;

  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function closeModal() {
  document.getElementById("iframeContainer").innerHTML = "";
  document.getElementById("paymentModal").classList.add("hidden");
}

</script>

<style>
.btn {
  @apply w-full flex items-center justify-between border rounded-2xl p-4 hover:bg-gray-50 transition group;
}
</style>

</body>
</html>
